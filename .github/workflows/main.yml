name: Python Project CI

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python Embeddable
        run: |
          curl -L -o python-embed.zip https://www.python.org/ftp/python/3.12.10/python-3.12.10-embed-amd64.zip
          Expand-Archive python-embed.zip -DestinationPath python_runtime
          
      - name: Configure Python for Site-Packages
        shell: pwsh
        run: |
          $pthFile = Get-ChildItem -Path python_runtime -Filter "*._pth" | Select-Object -First 1
          (Get-Content $pthFile.FullName) -replace '#import site', 'import site' | Set-Content $pthFile.FullName

      - name: Install Pip in Runtime
        run: |
          curl -L -o get-pip.py https://bootstrap.pypa.io/get-pip.py
          ./python_runtime/python.exe get-pip.py --no-warn-script-location
          
      - name: Install Dependencies to Runtime
        run: |
          ./python_runtime/python.exe -m pip install -r requirements.txt --target ./python_runtime/Lib/site-packages --no-cache-dir

      - name: Cleanup Runtime
        run: |
          Remove-Item get-pip.py
          Remove-Item python-embed.zip

      - name: Upload Python Runtime
        uses: actions/upload-artifact@v4
        with:
          name: python-runtime-windows
          path: python_runtime/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build VENV (Linux)
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          rm -rf venv/lib64

      - name: Upload VENV Linux
        uses: actions/upload-artifact@v4
        with:
          name: venv-linux
          path: venv/